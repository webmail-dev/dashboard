<div class="page-body">
                <!-- All User Table Start -->
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-sm-12">
                            <div class="card card-table">
                                <div class="card-body">
                                    <div class="title-header option-title">
                                        <h5>All Category</h5>
                                        <form class="d-inline-flex">
                                            <a href="javascript:void(0)"
                                                class="align-items-center btn btn-theme d-flex">
                                                <i data-feather="plus-square"></i>Add New
                                            </a>
                                        </form>
                                    </div>
                                    <div class="table-responsive theme-scrollbar">
                                        <div>
                                            <table class="table category-table" id="table_id">
                                                <thead>
                                                    <tr>
                                                        <th><input id="checkall" class="custom-checkbox" type="checkbox" name="text">
                                                        </th>
                                                        <th>Product Image</th>
                                                        <th>Product Name</th>
                                                        <th>Date</th>
                                                        <th>Foods</th>
                                                        <th>Option</th>
                                                    </tr>
                                                </thead>

                                                <tbody>
                                                    @for (category of categories; track category.id) {
                                                    <tr>
                                                        <td><input class="custom-checkbox" type="checkbox" name="text"></td>
                                                        <td>
                                                            <div class="table-image">
                                                                <img [src]="category.image || category.icon || 'assets/dashboard/images/product/1.png'" class="img-fluid" [alt]="category.alt || category.name">
                                                            </div>
                                                        </td>
                                                        <td>{{ category.name }}</td>
                                                        <td>{{ category.created | date: 'dd-MM-yyyy' }}</td>
                                                        <td>{{ category.type }}</td>
                                                        <td>
                                                            <ul class="d-flex align-items-center  justify-content-center">
                                                                <li><a href="javascript:void(0)"><i class="ri-eye-line"></i></a></li>
                                                                <li><a href="javascript:void(0)"><i class="ri-pencil-line"></i></a></li>
                                                                <li>
                                                                    <a href="javascript:void(0)" data-bs-toggle="modal" data-bs-target="#exampleModalToggle">
                                                                        <i class="ri-delete-bin-line"></i>
                                                                    </a>
                                                                </li>
                                                            </ul>
                                                        </td>
                                                    </tr>
                                                    } @empty {
                                                    <tr>
                                                        <td colspan="6" class="text-center">No categories found</td>
                                                    </tr>
                                                    }
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- All User Table Ends-->

                
              <app-footer />
</div>
